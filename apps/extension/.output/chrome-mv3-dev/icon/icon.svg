<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  
  <!-- Shield -->
  <g filter="url(#glow)">
    <path d="M64 16 L96 28 L96 56 C96 80 64 104 64 104 C64 104 32 80 32 56 L32 28 Z" 
          fill="url(#shield)" opacity="0.9"/>
    <path d="M64 24 L88 34 L88 54 C88 74 64 92 64 92 C64 92 40 74 40 54 L40 34 Z" 
          fill="#1a1a2e" opacity="0.3"/>
  </g>
  
  <!-- Check mark -->
  <path d="M50 64 L60 74 L78 54" 
        stroke="#a855f7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"
        filter="url(#glow)"/>
  
  <!-- Accent dots -->
  <circle cx="64" cy="16" r="2" fill="#c084fc" opacity="0.8"/>
  <circle cx="96" cy="28" r="2" fill="#c084fc" opacity="0.6"/>
  <circle cx="32" cy="28" r="2" fill="#c084fc" opacity="0.6"/>
</svg>