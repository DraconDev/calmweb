<!DOCTYPE html>
<html>
<head>
  <title>Generate CalmWeb Icons</title>
  <style>
    body { 
      background: #111; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 40px;
      color: #fff;
    }
    h1 { color: #888; font-size: 18px; margin-bottom: 20px; }
    .icons { display: flex; gap: 30px; flex-wrap: wrap; }
    .icon-box { text-align: center; }
    canvas { 
      background: #1a1a1a;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .size { color: #666; font-size: 12px; }
    a { 
      display: inline-block;
      margin-top: 4px;
      padding: 6px 12px;
      background: #333;
      color: #aaa;
      text-decoration: none;
      border-radius: 4px;
      font-size: 11px;
    }
    a:hover { background: #444; color: #fff; }
    .instructions {
      margin-top: 30px;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 8px;
      max-width: 500px;
    }
    .instructions h2 { color: #888; font-size: 14px; margin-bottom: 10px; }
    .instructions p { color: #666; font-size: 12px; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>CalmWeb Icon Generator</h1>
  <div class="icons" id="icons"></div>
  
  <div class="instructions">
    <h2>Instructions</h2>
    <p>Click each download button to save the PNG files. Place them in <code>apps/extension/public/icon/</code> directory with filenames: 16.png, 32.png, 48.png, 96.png, 128.png</p>
  </div>

  <script>
    const sizes = [16, 32, 48, 96, 128];
    const container = document.getElementById('icons');
    
    sizes.forEach(size => {
      const box = document.createElement('div');
      box.className = 'icon-box';
      
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      
      drawIcon(ctx, size);
      
      const label = document.createElement('div');
      label.className = 'size';
      label.textContent = `${size}x${size}`;
      
      const link = document.createElement('a');
      link.download = `${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.textContent = 'Download';
      
      box.appendChild(canvas);
      box.appendChild(label);
      box.appendChild(link);
      container.appendChild(box);
    });

    function drawIcon(ctx, size) {
      const s = size / 128;
      
      // Background - dark with subtle gradient
      const bgGrad = ctx.createLinearGradient(0, 0, size, size);
      bgGrad.addColorStop(0, '#1a1a1a');
      bgGrad.addColorStop(1, '#0d0d0d');
      
      // Rounded background
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, 20 * s);
      ctx.fillStyle = bgGrad;
      ctx.fill();
      
      // Shield gradient - subtle purple, mostly white/gray
      const shieldGrad = ctx.createLinearGradient(0, 0, size, size);
      shieldGrad.addColorStop(0, '#e0e0e0');
      shieldGrad.addColorStop(0.5, '#b0b0b0');
      shieldGrad.addColorStop(1, '#888888');
      
      // Draw shield
      ctx.beginPath();
      ctx.moveTo(64 * s, 14 * s);
      ctx.lineTo(98 * s, 26 * s);
      ctx.lineTo(98 * s, 56 * s);
      ctx.quadraticCurveTo(98 * s, 82 * s, 64 * s, 108 * s);
      ctx.quadraticCurveTo(30 * s, 82 * s, 30 * s, 56 * s);
      ctx.lineTo(30 * s, 26 * s);
      ctx.closePath();
      ctx.fillStyle = shieldGrad;
      ctx.fill();
      
      // Inner shield cutout
      ctx.beginPath();
      ctx.moveTo(64 * s, 24 * s);
      ctx.lineTo(88 * s, 34 * s);
      ctx.lineTo(88 * s, 54 * s);
      ctx.quadraticCurveTo(88 * s, 76 * s, 64 * s, 94 * s);
      ctx.quadraticCurveTo(40 * s, 76 * s, 40 * s, 54 * s);
      ctx.lineTo(40 * s, 34 * s);
      ctx.closePath();
      ctx.fillStyle = '#1a1a1a';
      ctx.fill();
      
      // Checkmark - subtle purple accent
      ctx.strokeStyle = '#a78bfa';
      ctx.lineWidth = Math.max(1, 5 * s);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      
      ctx.beginPath();
      ctx.moveTo(48 * s, 62 * s);
      ctx.lineTo(58 * s, 72 * s);
      ctx.lineTo(80 * s, 50 * s);
      ctx.stroke();
      
      // Small accent dot
      ctx.beginPath();
      ctx.arc(64 * s, 14 * s, 2 * s, 0, Math.PI * 2);
      ctx.fillStyle = '#a78bfa';
      ctx.fill();
    }
  </script>
</body>
</html>
