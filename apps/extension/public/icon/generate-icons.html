<!DOCTYPE html>
<html>
<head>
  <title>Icon Generator</title>
  <style>
    body { 
      background: #0f0f0f; 
      display: flex; 
      flex-wrap: wrap; 
      gap: 20px; 
      padding: 40px;
      font-family: system-ui;
    }
    .icon-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    canvas { 
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(168, 85, 247, 0.3);
    }
    .label {
      color: #a855f7;
      font-size: 12px;
      font-weight: 600;
    }
    a {
      color: #c084fc;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="icon-container">
    <canvas id="icon16" width="16" height="16"></canvas>
    <span class="label">16x16</span>
    <a id="link16" download="16.png">Download</a>
  </div>
  <div class="icon-container">
    <canvas id="icon32" width="32" height="32"></canvas>
    <span class="label">32x32</span>
    <a id="link32" download="32.png">Download</a>
  </div>
  <div class="icon-container">
    <canvas id="icon48" width="48" height="48"></canvas>
    <span class="label">48x48</span>
    <a id="link48" download="48.png">Download</a>
  </div>
  <div class="icon-container">
    <canvas id="icon96" width="96" height="96"></canvas>
    <span class="label">96x96</span>
    <a id="link96" download="96.png">Download</a>
  </div>
  <div class="icon-container">
    <canvas id="icon128" width="128" height="128"></canvas>
    <span class="label">128x128</span>
    <a id="link128" download="128.png">Download</a>
  </div>

  <script>
    function drawIcon(ctx, size) {
      const scale = size / 128;
      
      // Background gradient
      const bgGrad = ctx.createLinearGradient(0, 0, size, size);
      bgGrad.addColorStop(0, '#1a1a2e');
      bgGrad.addColorStop(1, '#16213e');
      
      // Rounded rectangle background
      const radius = 24 * scale;
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, radius);
      ctx.fillStyle = bgGrad;
      ctx.fill();
      
      // Shield gradient
      const shieldGrad = ctx.createLinearGradient(0, 0, size, size);
      shieldGrad.addColorStop(0, '#7c3aed');
      shieldGrad.addColorStop(0.5, '#a855f7');
      shieldGrad.addColorStop(1, '#c084fc');
      
      // Shield glow
      ctx.shadowColor = '#a855f7';
      ctx.shadowBlur = 8 * scale;
      
      // Draw shield
      ctx.beginPath();
      ctx.moveTo(64 * scale, 16 * scale);
      ctx.lineTo(96 * scale, 28 * scale);
      ctx.lineTo(96 * scale, 56 * scale);
      ctx.quadraticCurveTo(96 * scale, 80 * scale, 64 * scale, 104 * scale);
      ctx.quadraticCurveTo(32 * scale, 80 * scale, 32 * scale, 56 * scale);
      ctx.lineTo(32 * scale, 28 * scale);
      ctx.closePath();
      ctx.fillStyle = shieldGrad;
      ctx.globalAlpha = 0.9;
      ctx.fill();
      ctx.globalAlpha = 1;
      
      // Inner shield dark
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.moveTo(64 * scale, 24 * scale);
      ctx.lineTo(88 * scale, 34 * scale);
      ctx.lineTo(88 * scale, 54 * scale);
      ctx.quadraticCurveTo(88 * scale, 74 * scale, 64 * scale, 92 * scale);
      ctx.quadraticCurveTo(40 * scale, 74 * scale, 40 * scale, 54 * scale);
      ctx.lineTo(40 * scale, 34 * scale);
      ctx.closePath();
      ctx.fillStyle = '#1a1a2e';
      ctx.globalAlpha = 0.3;
      ctx.fill();
      ctx.globalAlpha = 1;
      
      // Checkmark
      ctx.strokeStyle = '#a855f7';
      ctx.lineWidth = 6 * scale;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.shadowColor = '#c084fc';
      ctx.shadowBlur = 4 * scale;
      
      ctx.beginPath();
      ctx.moveTo(50 * scale, 64 * scale);
      ctx.lineTo(60 * scale, 74 * scale);
      ctx.lineTo(78 * scale, 54 * scale);
      ctx.stroke();
      
      ctx.shadowBlur = 0;
    }

    const sizes = [16, 32, 48, 96, 128];
    sizes.forEach(size => {
      const canvas = document.getElementById(`icon${size}`);
      const ctx = canvas.getContext('2d');
      drawIcon(ctx, size);
      
      const link = document.getElementById(`link${size}`);
      link.href = canvas.toDataURL('image/png');
    });
  </script>
</body>
</html>
